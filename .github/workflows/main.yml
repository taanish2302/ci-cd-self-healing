name: CI Self Healing

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run main (may fail)
        run: python main.py || true

      - name: Run analyzer (auto-fix)
        run: python analyzer.py

      - name: Re-run main after fix
        run: python main.py
