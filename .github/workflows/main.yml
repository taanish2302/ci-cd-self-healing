name: CI Self-Healing Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install basic tools (no numpy yet → we WANT failure first)
      - name: Install base dependencies
        run: pip install --upgrade pip

      # 4. Run main (allow failure)
      - name: Run main (may fail)
        run: python main.py || true

      # 5. Run analyzer (detect + fix)
      - name: Run analyzer (auto-heal)
        run: python analyzer.py

      # 6. Re-run after fix
      - name: Re-run main after fix
        run: python main.py
